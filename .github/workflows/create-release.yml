name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref }}
          VERSION=${TAG#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_without_v=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Docker Image

            This release is available as a Docker image:

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version_without_v }}
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}:latest
            ```

            ## Changes

            For a list of changes in this release, see the [commits](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.version }}).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
