services:
  daywatch:
    build: .
    restart: unless-stopped
    ports:
      - "${DW_INGEST_PORT:-2407}:2407"   # Nightwatch ingest (point NIGHTWATCH_INGEST_URI here)
      - "${DW_HTTP_PORT:-8080}:8080"     # Web panel
    environment:
      DATABASE_URL: postgres://daywatch:${POSTGRES_PASSWORD:-daywatch}@db:5432/daywatch?sslmode=disable
      NIGHTWATCH_TOKEN: ${NIGHTWATCH_TOKEN:-}
      DW_RETENTION_DAYS: ${DW_RETENTION_DAYS:-14}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: daywatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daywatch}
      POSTGRES_DB: daywatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daywatch -d daywatch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
