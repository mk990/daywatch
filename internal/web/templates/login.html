<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Daywatch</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-brand">{{icon "sun"}} Daywatch</div>
  <p class="login-sub">Sign in to view the panel</p>
  {{if .Error}}<div class="login-error">{{.Error}}</div>{{end}}
  <form method="post" action="/login">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">{{icon "lock"}} Sign in</button>
  </form>
</div>
</body>
</html>
